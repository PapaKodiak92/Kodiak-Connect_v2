server {
    listen 80;
    server_name v2.kodiak-connect.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name v2.kodiak-connect.com;

    # Replace these paths with real certificate paths on the VPS.
    ssl_certificate /etc/nginx/certs/v2/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/v2/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        access_log off;
        return 200 "app-v2 proxy ok\n";
    }
}
