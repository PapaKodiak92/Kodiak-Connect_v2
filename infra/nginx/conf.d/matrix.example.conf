server {
    listen 80;
    server_name matrix-kodiak-connect.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name matrix-kodiak-connect.com;

    # Replace these paths with real certificate paths on the VPS.
    ssl_certificate /etc/nginx/certs/matrix/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/matrix/privkey.pem;

    client_max_body_size 100M;

    location ~ ^(/_matrix|/_synapse/client) {
        proxy_pass http://synapse:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    location /health {
        access_log off;
        return 200 "matrix proxy ok\n";
    }
}
